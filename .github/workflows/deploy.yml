name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run deploy in dry-run mode without changing remote files
        required: true
        default: true
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false
        env:
          CI: true

      - name: Build application
        run: npm run build

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Validate deploy path
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          case "$DEPLOY_PATH" in
            ""|"/"|"/public_html"|*/public_html|*/public_html/)
              echo "Unsafe DEPLOY_PATH: refusing to deploy to public_html root."
              exit 1
              ;;
            */public_html/*)
              echo "Validated DEPLOY_PATH=$DEPLOY_PATH"
              ;;
            *)
              echo "DEPLOY_PATH must point to a subdirectory inside public_html."
              exit 1
              ;;
          esac

      - name: Deploy build to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          DRY_RUN_FLAG=""
          if [ "$DRY_RUN" = "true" ]; then
            DRY_RUN_FLAG="n"
            echo "Running rsync in dry-run mode."
          fi

          ssh -p "$PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}'"

          rsync -avz${DRY_RUN_FLAG} --delete \
            -e "ssh -p $PORT" \
            build/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
